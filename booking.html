<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syl’s Tea Party | Booking</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <a href="index.html" class="logo">Syl’s Tea <i class="fas fa-mug-hot"></i></a>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="events.html">Events</a>
        <a href="store.html">Store</a>
        <a href="blog.html">Blog</a>
        <a href="booking.html" class="btn">Book a Table</a>
    </nav>
</header>

<!-- BOOKING FORM -->
<section class="book">
    <h2 class="section-title">Reserve Your Table</h2>
    <form class="book-form" action="">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <input type="number" placeholder="Number of Guests" required>
        <input type="date" required>
        <input type="time" required>
        <textarea placeholder="Special Requests" rows="5"></textarea>
        <button type="submit">Book Now</button>
    </form>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Syl’s Tea Party | Luxury Tea & Pastries | NYC</p>
    <div class="socials">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-pinterest"></i></a>
    </div>
</footer>

</body>
</html>
